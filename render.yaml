services:
  - type: web
    name: tennis-match-analyzer
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --timeout 300 --bind 0.0.0.0:$PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: DB_PATH
        value: /tmp/tennis_matches.db
      - key: PYTHON_VERSION
        value: "3.11.9"
