<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a1a2e">
    <title>Tennis Ball In/Out Detector</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header {
            background: #16213e;
            padding: 12px 16px;
            text-align: center;
            border-bottom: 1px solid #0f3460;
        }

        .header h1 {
            font-size: 1.2rem;
            color: #e94560;
        }

        .nav-tabs {
            display: flex;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
        }

        .nav-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            font-size: 0.9rem;
            color: #aaa;
            border: none;
            background: none;
            transition: all 0.2s;
        }

        .nav-tab.active {
            color: #e94560;
            border-bottom: 2px solid #e94560;
        }

        .view {
            display: none;
            padding: 16px;
        }

        .view.active {
            display: block;
        }

        /* Camera View */
        .camera-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
        }

        #videoPreview {
            width: 100%;
            display: block;
            border-radius: 12px;
        }

        .record-btn {
            display: block;
            width: 72px;
            height: 72px;
            margin: 20px auto;
            border-radius: 50%;
            border: 4px solid #e94560;
            background: transparent;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }

        .record-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 48px;
            height: 48px;
            background: #e94560;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .record-btn.recording::after {
            width: 28px;
            height: 28px;
            border-radius: 4px;
        }

        .record-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .status-text {
            text-align: center;
            color: #aaa;
            font-size: 0.85rem;
            margin-top: 8px;
        }

        .timer {
            text-align: center;
            font-size: 1.5rem;
            color: #e94560;
            font-weight: bold;
            margin-top: 8px;
            display: none;
        }

        .timer.visible {
            display: block;
        }

        /* Frame Review */
        .frames-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 8px;
            margin: 16px 0;
        }

        .frame-thumb {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid #333;
        }

        .action-btn {
            display: block;
            width: 100%;
            max-width: 400px;
            margin: 12px auto;
            padding: 16px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: #e94560;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #d63851;
        }

        .btn-secondary {
            background: #333;
            color: #eee;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #444;
        }

        /* Results */
        .result-card {
            background: #16213e;
            border-radius: 16px;
            padding: 24px;
            margin: 16px auto;
            max-width: 400px;
            text-align: center;
        }

        .result-verdict {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 16px 0;
        }

        .result-verdict.in {
            color: #4caf50;
        }

        .result-verdict.out {
            color: #f44336;
        }

        .result-verdict.close-call {
            color: #ff9800;
        }

        .result-percentage {
            font-size: 1.2rem;
            margin: 8px 0;
            color: #ccc;
        }

        .result-confidence {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 600;
            margin: 8px 0;
        }

        .confidence-high { background: #1b5e20; color: #a5d6a7; }
        .confidence-medium { background: #e65100; color: #ffcc80; }
        .confidence-low { background: #b71c1c; color: #ef9a9a; }

        .result-explanation {
            font-size: 0.9rem;
            color: #aaa;
            margin-top: 16px;
            line-height: 1.4;
        }

        /* History */
        .history-list {
            max-width: 500px;
            margin: 0 auto;
        }

        .history-item {
            background: #16213e;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-result {
            font-size: 1.2rem;
            font-weight: 700;
        }

        .history-meta {
            font-size: 0.75rem;
            color: #888;
            margin-top: 4px;
        }

        .history-delete {
            background: none;
            border: none;
            color: #666;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 8px;
        }

        .history-delete:hover {
            color: #e94560;
        }

        .empty-state {
            text-align: center;
            color: #666;
            padding: 40px 16px;
        }

        /* Loading */
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loading.visible {
            display: block;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #333;
            border-top: 4px solid #e94560;
            border-radius: 50%;
            margin: 0 auto 16px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-msg {
            background: #b71c1c;
            color: white;
            padding: 12px 16px;
            border-radius: 8px;
            margin: 16px;
            text-align: center;
            display: none;
        }

        .error-msg.visible {
            display: block;
        }

        /* Upload fallback */
        .upload-fallback {
            display: none;
            text-align: center;
            padding: 24px 16px;
            max-width: 400px;
            margin: 0 auto;
        }

        .upload-fallback.visible {
            display: block;
        }

        .upload-fallback p {
            color: #aaa;
            font-size: 0.9rem;
            margin-bottom: 16px;
            line-height: 1.4;
        }

        .upload-label {
            display: block;
            width: 100%;
            max-width: 400px;
            margin: 12px auto;
            padding: 16px;
            font-size: 1rem;
            font-weight: 600;
            border: 2px dashed #e94560;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            color: #e94560;
            background: transparent;
            transition: all 0.2s;
        }

        .upload-label:hover {
            background: rgba(233, 69, 96, 0.1);
        }

        .upload-input {
            display: none;
        }

        .or-divider {
            color: #666;
            font-size: 0.85rem;
            margin: 16px 0;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Tennis Ball In/Out Detector</h1>
    </div>

    <div class="nav-tabs">
        <button class="nav-tab active" data-view="camera">Camera</button>
        <button class="nav-tab" data-view="results">Results</button>
        <button class="nav-tab" data-view="history">History</button>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <!-- Camera / Record View -->
    <div class="view active" id="cameraView">
        <div class="camera-container">
            <video id="videoPreview" autoplay playsinline muted></video>
        </div>
        <div class="timer" id="recordTimer">0.0s</div>
        <button class="record-btn" id="recordBtn" disabled></button>
        <p class="status-text" id="cameraStatus">Initializing camera...</p>

        <div class="or-divider" id="orDivider" style="display:none;">- or -</div>

        <div class="upload-fallback" id="uploadFallback">
            <p>Camera unavailable? Upload a video of the ball landing instead.</p>
            <label class="upload-label" for="videoUpload">
                📁 Upload Video File
            </label>
            <input type="file" id="videoUpload" class="upload-input" accept="video/*">
        </div>
    </div>

    <!-- Frame Review View -->
    <div class="view" id="frameReviewView">
        <h2 style="text-align:center;margin-bottom:12px;font-size:1.1rem;">Review Frames</h2>
        <div class="frames-grid" id="framesGrid"></div>
        <button class="action-btn btn-primary" id="analyzeBtn">Analyze Ball Position</button>
        <button class="action-btn btn-secondary" id="retakeBtn">Retake</button>
    </div>

    <!-- Results View -->
    <div class="view" id="resultsView">
        <div class="loading" id="loadingIndicator">
            <div class="spinner"></div>
            <p>Analyzing frames with Gemini AI...</p>
        </div>
        <div id="resultContent" style="display:none;">
            <div class="result-card">
                <div class="result-verdict" id="resultVerdict"></div>
                <div class="result-percentage" id="resultPercentage"></div>
                <span class="result-confidence" id="resultConfidence"></span>
                <p class="result-explanation" id="resultExplanation"></p>
            </div>
            <button class="action-btn btn-primary" id="newCallBtn">New Call</button>
        </div>
    </div>

    <!-- History View -->
    <div class="view" id="historyView">
        <div class="history-list" id="historyList">
            <div class="empty-state">No calls yet. Record a ball landing to get started.</div>
        </div>
    </div>

    <!-- Hidden elements for frame extraction -->
    <video id="hiddenVideo" style="display:none;"></video>
    <canvas id="hiddenCanvas" style="display:none;"></canvas>

    <script>
        // State
        let mediaStream = null;
        let mediaRecorder = null;
        let recordedChunks = [];
        let extractedFrames = [];
        let isRecording = false;
        let recordStartTime = 0;
        let timerInterval = null;

        // DOM elements
        const videoPreview = document.getElementById('videoPreview');
        const recordBtn = document.getElementById('recordBtn');
        const cameraStatus = document.getElementById('cameraStatus');
        const recordTimer = document.getElementById('recordTimer');
        const framesGrid = document.getElementById('framesGrid');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const retakeBtn = document.getElementById('retakeBtn');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const resultContent = document.getElementById('resultContent');
        const resultVerdict = document.getElementById('resultVerdict');
        const resultPercentage = document.getElementById('resultPercentage');
        const resultConfidence = document.getElementById('resultConfidence');
        const resultExplanation = document.getElementById('resultExplanation');
        const newCallBtn = document.getElementById('newCallBtn');
        const historyList = document.getElementById('historyList');
        const errorMsg = document.getElementById('errorMsg');

        // Navigation
        document.querySelectorAll('.nav-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                const view = tab.dataset.view;
                document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));

                if (view === 'camera') {
                    document.getElementById('cameraView').classList.add('active');
                } else if (view === 'results') {
                    document.getElementById('resultsView').classList.add('active');
                } else if (view === 'history') {
                    document.getElementById('historyView').classList.add('active');
                    loadHistory();
                }
            });
        });

        // Show error
        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.add('visible');
            setTimeout(() => errorMsg.classList.remove('visible'), 5000);
        }

        // Switch to view
        function switchToView(viewName) {
            document.querySelectorAll('.nav-tab').forEach(t => {
                t.classList.toggle('active', t.dataset.view === viewName);
            });
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            if (viewName === 'camera') {
                document.getElementById('cameraView').classList.add('active');
            } else if (viewName === 'results') {
                document.getElementById('resultsView').classList.add('active');
            } else if (viewName === 'history') {
                document.getElementById('historyView').classList.add('active');
            } else if (viewName === 'frameReview') {
                document.getElementById('frameReviewView').classList.add('active');
            }
        }

        // Initialize camera
        async function initCamera() {
            // Check for MediaRecorder support
            if (typeof MediaRecorder === 'undefined') {
                recordBtn.disabled = true;
                cameraStatus.textContent = 'Your browser does not support video recording (MediaRecorder). Please use a modern browser such as Chrome, Firefox, or Safari 14.3+.';
                showUploadFallback();
                return;
            }

            // Check if getUserMedia is available
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                cameraStatus.textContent = 'Camera API not available. This may require HTTPS.';
                showUploadFallback();
                return;
            }

            // Try with rear-facing camera first
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: false
                });
                videoPreview.srcObject = mediaStream;
                recordBtn.disabled = false;
                cameraStatus.textContent = 'Tap to record ball landing';
                showUploadOption();
                return;
            } catch (err) {
                console.warn('Rear camera failed, trying any camera:', err.message);
            }

            // Fallback: try with any camera (no facingMode constraint)
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({
                    video: { width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: false
                });
                videoPreview.srcObject = mediaStream;
                recordBtn.disabled = false;
                cameraStatus.textContent = 'Tap to record ball landing';
                showUploadOption();
                return;
            } catch (err) {
                console.warn('Any camera failed, trying basic video:', err.message);
            }

            // Last resort: simplest possible constraints
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                videoPreview.srcObject = mediaStream;
                recordBtn.disabled = false;
                cameraStatus.textContent = 'Tap to record ball landing';
                showUploadOption();
                return;
            } catch (err) {
                console.error('All camera attempts failed:', err.message);
                cameraStatus.textContent = 'Unable to access camera.';
                showUploadFallback();
            }
        }

        // Show upload as the primary fallback when camera fails
        function showUploadFallback() {
            const uploadFallback = document.getElementById('uploadFallback');
            uploadFallback.classList.add('visible');
            uploadFallback.querySelector('p').textContent =
                'Camera is not available. You can upload a video file of the ball landing instead.';
        }

        // Show upload as an additional option when camera works
        function showUploadOption() {
            const uploadFallback = document.getElementById('uploadFallback');
            const orDivider = document.getElementById('orDivider');
            uploadFallback.classList.add('visible');
            orDivider.style.display = 'block';
            uploadFallback.querySelector('p').textContent =
                'You can also upload a video file instead of recording.';
        }

        // Recording
        recordBtn.addEventListener('click', () => {
            if (!isRecording) {
                startRecording();
            } else {
                stopRecording();
            }
        });

        function startRecording() {
            recordedChunks = [];
            const options = { mimeType: 'video/webm;codecs=vp8' };
            if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                // Fallback
                delete options.mimeType;
            }
            try {
                mediaRecorder = new MediaRecorder(mediaStream, options);
            } catch (e) {
                mediaRecorder = new MediaRecorder(mediaStream);
            }

            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };

            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                extractFramesFromBlob(blob);
            };

            mediaRecorder.start(100);
            isRecording = true;
            recordBtn.classList.add('recording');
            cameraStatus.textContent = 'Recording... tap to stop';
            recordStartTime = Date.now();
            recordTimer.classList.add('visible');
            updateTimer();
            timerInterval = setInterval(updateTimer, 100);

            // Auto-stop after 3 seconds
            setTimeout(() => {
                if (isRecording) stopRecording();
            }, 3000);
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
            isRecording = false;
            recordBtn.classList.remove('recording');
            cameraStatus.textContent = 'Processing...';
            recordTimer.classList.remove('visible');
            clearInterval(timerInterval);
        }

        function updateTimer() {
            const elapsed = ((Date.now() - recordStartTime) / 1000).toFixed(1);
            recordTimer.textContent = elapsed + 's';
        }

        // Frame extraction
        async function extractFramesFromBlob(blob) {
            const hiddenVideo = document.getElementById('hiddenVideo');
            const canvas = document.getElementById('hiddenCanvas');
            const ctx = canvas.getContext('2d');
            const url = URL.createObjectURL(blob);

            hiddenVideo.src = url;
            hiddenVideo.muted = true;

            await new Promise((resolve, reject) => {
                hiddenVideo.onloadedmetadata = resolve;
                hiddenVideo.onerror = reject;
            });

            await new Promise((resolve) => {
                hiddenVideo.oncanplaythrough = resolve;
                hiddenVideo.load();
            });

            const duration = hiddenVideo.duration;
            const numFrames = 5;
            extractedFrames = [];

            canvas.width = hiddenVideo.videoWidth || 640;
            canvas.height = hiddenVideo.videoHeight || 480;

            for (let i = 0; i < numFrames; i++) {
                const time = (duration / (numFrames + 1)) * (i + 1);
                hiddenVideo.currentTime = time;
                await new Promise(resolve => {
                    hiddenVideo.onseeked = resolve;
                });
                ctx.drawImage(hiddenVideo, 0, 0, canvas.width, canvas.height);
                const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
                const base64 = dataUrl.split(',')[1];
                extractedFrames.push(base64);
            }

            URL.revokeObjectURL(url);
            showFrameReview();
        }

        function showFrameReview() {
            framesGrid.innerHTML = '';
            extractedFrames.forEach((b64, i) => {
                const img = document.createElement('img');
                img.src = 'data:image/jpeg;base64,' + b64;
                img.className = 'frame-thumb';
                img.alt = 'Frame ' + (i + 1);
                framesGrid.appendChild(img);
            });
            switchToView('frameReview');
            cameraStatus.textContent = 'Tap to record ball landing';
        }

        // Analyze
        analyzeBtn.addEventListener('click', async () => {
            switchToView('results');
            loadingIndicator.classList.add('visible');
            resultContent.style.display = 'none';

            try {
                const resp = await fetch('/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ frames: extractedFrames })
                });
                const data = await resp.json();

                if (!resp.ok) {
                    throw new Error(data.error || 'Analysis failed');
                }

                displayResult(data);
            } catch (err) {
                showError(err.message);
                switchToView('frameReview');
            } finally {
                loadingIndicator.classList.remove('visible');
            }
        });

        function displayResult(data) {
            const pctIn = data.percentage_in;
            const pctOut = data.percentage_out;

            let verdict, verdictClass;
            if (pctIn >= 60) {
                verdict = 'IN';
                verdictClass = 'in';
            } else if (pctOut >= 60) {
                verdict = 'OUT';
                verdictClass = 'out';
            } else {
                verdict = 'CLOSE';
                verdictClass = 'close-call';
            }

            resultVerdict.textContent = verdict;
            resultVerdict.className = 'result-verdict ' + verdictClass;
            resultPercentage.textContent = `IN: ${pctIn.toFixed(1)}% | OUT: ${pctOut.toFixed(1)}%`;

            resultConfidence.textContent = data.confidence;
            resultConfidence.className = 'result-confidence confidence-' + data.confidence;

            resultExplanation.textContent = data.explanation;
            resultContent.style.display = 'block';
        }

        // Retake / New Call
        retakeBtn.addEventListener('click', () => {
            extractedFrames = [];
            switchToView('camera');
        });

        newCallBtn.addEventListener('click', () => {
            extractedFrames = [];
            switchToView('camera');
        });

        // Escape HTML to prevent XSS
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // History
        async function loadHistory() {
            try {
                const resp = await fetch('/history');
                const data = await resp.json();

                if (data.length === 0) {
                    historyList.innerHTML = '<div class="empty-state">No calls yet. Record a ball landing to get started.</div>';
                    return;
                }

                historyList.innerHTML = data.map(call => {
                    const pctIn = call.result_in_pct;
                    const pctOut = call.result_out_pct;
                    let color = '#ff9800';
                    let label = 'CLOSE';
                    if (pctIn >= 60) { color = '#4caf50'; label = 'IN'; }
                    else if (pctOut >= 60) { color = '#f44336'; label = 'OUT'; }

                    return `
                        <div class="history-item">
                            <div>
                                <div class="history-result" style="color:${color}">${label} (${pctIn.toFixed(0)}%/${pctOut.toFixed(0)}%)</div>
                                <div class="history-meta">${escapeHtml(call.created_at)} | ${call.num_frames} frames | ${escapeHtml(call.confidence)} confidence</div>
                            </div>
                            <button class="history-delete" onclick="deleteCall(${call.id})">&#x2715;</button>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                showError('Failed to load history');
            }
        }

        async function deleteCall(id) {
            try {
                await fetch('/call/' + id, { method: 'DELETE' });
                loadHistory();
            } catch (err) {
                showError('Failed to delete call');
            }
        }

        // Video file upload handler
        document.getElementById('videoUpload').addEventListener('change', async (event) => {
            const file = event.target.files[0];
            if (!file) return;

            if (!file.type.startsWith('video/')) {
                showError('Please select a video file.');
                return;
            }

            cameraStatus.textContent = 'Processing uploaded video...';
            recordBtn.disabled = true;

            try {
                await extractFramesFromBlob(file);
            } catch (err) {
                showError('Failed to process video: ' + err.message);
                cameraStatus.textContent = 'Upload failed. Please try another video.';
                recordBtn.disabled = !mediaStream;
            }

            // Reset the file input so the same file can be re-selected
            event.target.value = '';
        });

        // Init
        initCamera();
    </script>
</body>
</html>
